version: 2

project_name: nylas

before:
  hooks:
    - go mod tidy
    - mkdir -p completions
    - sh -c "go run ./cmd/nylas completion bash > completions/nylas.bash"
    - sh -c "go run ./cmd/nylas completion zsh > completions/nylas.zsh"
    - sh -c "go run ./cmd/nylas completion fish > completions/nylas.fish"

builds:
  - main: ./cmd/nylas
    binary: nylas
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w
      - -X github.com/nylas/cli/internal/version.Version={{.Version}}
      - -X github.com/nylas/cli/internal/version.Commit={{.Commit}}
      - -X github.com/nylas/cli/internal/version.BuildDate={{.Date}}

archives:
  - formats:
      - tar.gz
      - zip
    format_overrides:
      - goos: windows
        formats:
          - zip
      - goos: linux
        formats:
          - tar.gz
      - goos: darwin
        formats:
          - tar.gz
    name_template: >-
      {{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}
    files:
      - README.md
      - LICENSE*
      - docs/*
      - completions/*

nfpms:
  - id: nylas-cli
    package_name: nylas
    vendor: Nylas
    homepage: https://cli.nylas.com/
    maintainer: Nylas <support@nylas.com>
    description: CLI for Nylas API - manage email, calendar, and contacts
    license: MIT
    formats:
      - deb
      - rpm
      - apk
      - archlinux
    scripts:
      postinstall: scripts/postinstall.sh
    bindir: /usr/bin
    section: utils
    priority: optional
    contents:
      - src: completions/nylas.bash
        dst: /usr/share/bash-completion/completions/nylas
      - src: completions/nylas.zsh
        dst: /usr/share/zsh/vendor-completions/_nylas
        packager: deb
      - src: completions/nylas.zsh
        dst: /usr/share/zsh/vendor-completions/_nylas
        packager: apk
      - src: completions/nylas.zsh
        dst: /usr/share/zsh/site-functions/_nylas
        packager: rpm
      - src: completions/nylas.zsh
        dst: /usr/share/zsh/site-functions/_nylas
        packager: archlinux
      - src: completions/nylas.fish
        dst: /usr/share/fish/vendor_completions.d/nylas.fish

aurs:
  - name: nylas
    homepage: https://cli.nylas.com/
    description: CLI for Nylas API - manage email, calendar, and contacts
    maintainers:
      - "Nylas <support@nylas.com>"
    license: MIT
    private_key: "{{ .Env.AUR_SSH_KEY_PATH }}"
    git_url: "ssh://aur@aur.archlinux.org/nylas-bin.git"
    disable: "{{ .IsSnapshot }}"
    depends:
      - glibc
    optdepends:
      - "bash-completion: for bash completions"
      - "zsh: for zsh completions"
      - "fish: for fish completions"
    package: |-
      install -Dm755 nylas "${pkgdir}/usr/bin/nylas"
      install -Dm644 completions/nylas.bash "${pkgdir}/usr/share/bash-completion/completions/nylas"
      install -Dm644 completions/nylas.zsh "${pkgdir}/usr/share/zsh/site-functions/_nylas"
      install -Dm644 completions/nylas.fish "${pkgdir}/usr/share/fish/vendor_completions.d/nylas.fish"

checksum:
  name_template: 'checksums.txt'

changelog:
  sort: asc
  use: github
  filters:
    exclude:
      - '^docs:'
      - '^test:'
      - '^chore:'
      - '^ci:'
      - Merge pull request
      - Merge branch
  groups:
    - title: Features
      regexp: '^.*?feat(\([[:word:]]+\))??!?:.+$'
      order: 0
    - title: Bug Fixes
      regexp: '^.*?fix(\([[:word:]]+\))??!?:.+$'
      order: 1
    - title: Other
      order: 999

